server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name sketchydraw.com www.sketchydraw.com;

    server_tokens off;

    client_max_body_size 300M;
    client_body_timeout 300s;
    client_header_timeout 30s;

    ssl_certificate /etc/letsencrypt/live/sketchydraw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sketchydraw.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/sketchydraw-ui;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ /\.(?!well-known) {
        return 403;
    }

    location ~* \.(env|log|conf|ini|bak|backup|old|save|sql|sh|pem|key|zip|tar|gz|7z|rar)$ {
        return 403;
    }

    location ~* ^/(wp-admin|wp-login\.php|wordpress|xmlrpc\.php|phpmyadmin|pma|adminer|cgi-bin|vendor|composer\.json|composer\.lock|server-status) {
        return 404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_request_buffering on;
        proxy_buffering off;
    }

    location /static/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /favicon.ico {
        try_files $uri =404;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
